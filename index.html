<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Gym Log</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #181b22;
      --card-2: #20242e;
      --text: #f4f6fb;
      --muted: #a5adba;
      --border: #303642;
      --accent: #6ea8fe;
      --danger: #ff6b6b;
      --ok: #7ee787;
      --shadow: 0 10px 30px rgba(0,0,0,.25);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    html {
      background: #000;
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #000;
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, #0f1115 0%, #111722 100%);
    }

    header {
      position: sticky;
      top: env(safe-area-inset-top);
      z-index: 10;
      padding: 18px 16px 12px;
      background: rgba(15, 17, 21, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .topbar {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    main {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }

    button, input, textarea, select { font: inherit; }

    button {
      border: 0;
      border-radius: 14px;
      padding: 11px 14px;
      color: var(--text);
      background: var(--card-2);
      cursor: pointer;
      min-height: 44px;
    }

    button.primary {
      background: var(--accent);
      color: #07101f;
      font-weight: 700;
    }

    button.danger {
      background: rgba(255, 107, 107, .14);
      color: var(--danger);
      border: 1px solid rgba(255, 107, 107, .32);
    }

    button.ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    button.edit {
      background: rgba(126, 231, 135, .16);
      color: var(--ok);
      border: 1px solid rgba(126, 231, 135, .38);
      font-weight: 800;
    }

    button.add-line {
      background: var(--ok);
      color: #07130a;
      border: 1px solid rgba(126, 231, 135, .65);
      font-weight: 900;
      font-size: 20px;
    }

    .card {
      background: rgba(24, 27, 34, .92);
      border: 1px solid rgba(255,255,255,.07);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 14px;
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin: 0 0 6px;
    }

    input, textarea, select {
      width: 100%;
      background: #10141c;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 12px;
      outline: none;
      min-height: 44px;
    }

    textarea { min-height: 78px; resize: vertical; }

    .muted { color: var(--muted); }
    .small { font-size: 13px; }
    .title { font-weight: 800; font-size: 18px; margin: 0 0 4px; }
    .subtitle { color: var(--muted); font-size: 13px; margin: 0; }

    .actions, .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 12px;
      margin-bottom: 12px;
    }

    .hidden { display: none !important; }

    nav.tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    nav.tabs button.active {
      background: var(--accent);
      color: #07101f;
      font-weight: 800;
    }

    .empty {
      text-align: center;
      padding: 28px 14px;
      color: var(--muted);
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #10141c;
    }

    table.sheet {
      width: max-content;
      min-width: 100%;
      table-layout: auto;
      border-collapse: collapse;
      font-size: 12px;
    }

    table.sheet th,
    table.sheet td {
      border-bottom: 1px solid rgba(255,255,255,.08);
      border-right: 1px solid rgba(255,255,255,.06);
      padding: 4px 6px;
      text-align: left;
      white-space: nowrap;
      line-height: 1.15;
    }

    table.sheet th {
      position: sticky;
      top: 0;
      background: #171c26;
      color: var(--muted);
      font-size: 11px;
      z-index: 1;
      padding-top: 5px;
      padding-bottom: 5px;
    }

    table.sheet tr.exercise-end td {
      border-bottom: 3px solid rgba(244, 246, 251, .28);
    }

    table.sheet td button {
      min-height: 28px;
      padding: 3px 7px;
      border-radius: 8px;
      font-size: 11px;
    }

    table.sheet input.inline-edit {
      min-height: 24px;
      padding: 3px 5px;
      border-radius: 6px;
      font-size: 11px;
      min-width: 44px;
    }

    .btn-save-inline {
      background: var(--ok);
      color: #07130a;
      border: 1px solid rgba(126, 231, 135, .65);
      font-weight: 900;
    }

    .col-date { min-width: max-content; padding-left: 4px !important; padding-right: 4px !important; }
    .col-day { min-width: max-content; padding-left: 4px !important; padding-right: 4px !important; }
    .col-series { min-width: max-content; text-align: center !important; padding-left: 4px !important; padding-right: 4px !important; font-size: 10px; }
    .col-reps { min-width: max-content; text-align: center !important; padding-left: 4px !important; padding-right: 4px !important; }
    .col-rest { min-width: max-content; padding-left: 4px !important; padding-right: 4px !important; }
    .col-rir { min-width: max-content; text-align: center !important; padding-left: 4px !important; padding-right: 4px !important; }
    .col-action { min-width: max-content; text-align: center !important; padding-left: 3px !important; padding-right: 3px !important; }
    .col-action button { min-width: 22px; min-height: 24px; padding: 2px 5px; border-radius: 7px; font-size: 10px; margin: 0 1px; }

    .exercise-cell {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .set-rest-timer {
      --timer-progress: 0%;
      width: 30px;
      height: 30px;
      min-width: 30px;
      min-height: 30px;
      flex: 0 0 30px;
      padding: 0;
      border-radius: 50%;
      border: 1px solid rgba(165, 173, 186, .72);
      background: transparent;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .set-rest-timer::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: #10141c;
      z-index: 0;
    }

    .set-rest-timer span {
      position: relative;
      z-index: 1;
    }

    .set-rest-timer.is-running {
      background: conic-gradient(#9fd8a8 var(--timer-progress), transparent 0);
      border-color: #9fd8a8;
      color: var(--text);
    }

    .set-rest-timer.is-running::after {
      background: #10141c;
    }

    .set-rest-timer.is-complete {
      border-color: #9fd8a8;
    }

    .set-rest-timer.is-complete::after {
      background: #9fd8a8;
    }

    .exercise-name {
      overflow: visible;
      text-overflow: clip;
    }

    table.sheet th:nth-child(1), table.sheet td:nth-child(1) { min-width: max-content; }
    table.sheet th:nth-child(7), table.sheet td:nth-child(7) { min-width: max-content; }
    table.sheet th:nth-child(10), table.sheet td:nth-child(10) { min-width: max-content; }


    .table-date-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      margin-bottom: 10px;
    }

    .table-date-row label {
      margin: 0;
      font-size: 11px;
    }

    .btn-delete-day {
      min-height: 30px;
      padding: 4px 8px;
      border-radius: 9px;
      font-size: 11px;
      line-height: 1;
    }

    .quick-row-panel {
      box-shadow: none;
      margin-top: 10px;
    }

    .quick-field-stack {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .quick-metrics-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .quick-metrics-row input {
      padding-left: 8px;
      padding-right: 8px;
    }

    input.compact-date {
      width: 138px;
      min-height: 32px;
      height: 32px;
      padding: 4px 7px;
      border-radius: 9px;
      font-size: 12px;
    }

    input.compact-day {
      width: 58px;
      min-height: 32px;
      height: 32px;
      padding: 4px 7px;
      border-radius: 9px;
      font-size: 12px;
      text-align: center;
    }

    .text-output {
      width: 100%;
      min-height: 220px;
      margin-top: 12px;
      background: #0b0f16;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.35;
      white-space: pre-wrap;
    }

    @media (max-width: 430px) {
      main { padding: 12px; }
      .row, .row-3 { grid-template-columns: 1fr; }
      h1 { font-size: 22px; }
      .quick-metrics-row { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>Gym Log</h1>
        <p class="subtitle">Días, series, peso, RIR y notas</p>
      </div>
    </div>
  </header>

  <main>
    <nav class="tabs">
      <button id="tab-table" class="active" type="button">Entrenos</button>
      <button id="tab-history" type="button">Historial</button>
      <button id="tab-backup" type="button">Backup</button>
    </nav>

    <section id="view-table"></section>
    <section id="view-history" class="hidden"></section>
    <section id="view-backup" class="hidden"></section>
  </main>

  <script>
    'use strict';

    const STORAGE_KEY = 'gym-log-v2';

    let state = normalizeState(loadState());
    let activeView = 'table';
    let lastQuickRowStatus = '';
    let lastQuickRowDefaults = { date: todayISO(), workoutTitle: '', exerciseName: '', weight: '', rest: '' };
    let editingRowId = null;
    let draftRowId = null;
    let currentTableDate = null;
    let currentTableDay = null;
    let activeRestTimer = null;
    let restTimerInterval = null;
    let restAudioContext = null;
    const DAY_1_SEED_KEY = STORAGE_KEY + '-seed-day-1-2026-05-30';
    const DAY_1_SEED_DATE = '2026-05-30';
    const DAY_2_SEED_KEY = STORAGE_KEY + '-seed-day-2-2026-05-31';
    const DAY_2_SEED_DATE = '2026-05-31';

    function uid() {
      if (window.crypto && typeof window.crypto.randomUUID === 'function') return window.crypto.randomUUID();
      return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2);
    }

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function formatDate(iso) {
      if (!iso) return '';
      const parts = String(iso).split('-');
      if (parts.length !== 3) return String(iso);
      const y = parts[0];
      const m = parts[1];
      const d = parts[2];
      return d + '/' + m + '/' + String(y).slice(-2);
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function normalizeState(data) {
      if (!data || !Array.isArray(data.workouts)) data = { workouts: [] };
      if (!data.dayByDate || typeof data.dayByDate !== 'object') data.dayByDate = {};
      data.workouts.forEach(function(workout) {
        (workout.exercises || []).forEach(function(exercise) {
          (exercise.sets || []).forEach(function(set) {
            if (typeof set.done !== 'boolean') set.done = false;
          });
        });
      });
      return data;
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem('gym-log-v1');
        const parsed = raw ? JSON.parse(raw) : { workouts: [] };
        if (!parsed || !Array.isArray(parsed.workouts)) return { workouts: [] };
        return parsed;
      } catch (error) {
        console.warn('No se pudo cargar el estado:', error);
        return { workouts: [] };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      render();
    }

    function makeSet(weight, reps, rir, rest, notes) {
      return {
        id: uid(),
        weight,
        reps,
        rir: rir == null ? '' : rir,
        rest: rest || '',
        notes: notes || '',
        done: false
      };
    }

    function seedDay1Workout() {
      if (localStorage.getItem(DAY_1_SEED_KEY)) return;

      const exercises = [
        {
          id: uid(),
          name: 'Facepull',
          notes: '',
          sets: [
            makeSet(8, 15, '', '', '8 ladrillos'),
            makeSet(8, 15, '', '', '8 ladrillos')
          ]
        },
        {
          id: uid(),
          name: 'Press plano',
          notes: 'Calentamiento incluido.',
          sets: [
            makeSet(0, 15, '', '', 'Calentamiento - barra sola'),
            makeSet(50, 8, '', '', 'Calentamiento'),
            makeSet(70, 5, '', '', 'Calentamiento'),
            makeSet(85, 3, '', '', 'Calentamiento'),
            makeSet(95, 2, '', '', 'Calentamiento'),
            makeSet(107, 5, 1, '', ''),
            makeSet(97, 5, '', '', ''),
            makeSet(97, 5, '', '', ''),
            makeSet(97, 5, '', '', ''),
            makeSet(97, 5, '1-2', '', '')
          ]
        },
        {
          id: uid(),
          name: 'Press inclinado',
          notes: '',
          sets: [
            makeSet(75, 8, '', '', ''),
            makeSet(75, 8, 2, '', '')
          ]
        },
        {
          id: uid(),
          name: 'Remo máquina pesado',
          notes: '',
          sets: [
            makeSet(135, 8, '', '2 min', ''),
            makeSet(135, 8, '', '2 min', ''),
            makeSet(135, 8, 1, '2 min', '')
          ]
        },
        {
          id: uid(),
          name: 'Chin up con lastre',
          notes: '',
          sets: [
            makeSet(20, 6, '', '3 min', 'Preferí dejar más RIR'),
            makeSet(20, 6, '', '3 min', ''),
            makeSet(20, 6, 2, '3 min', '')
          ]
        },
        {
          id: uid(),
          name: 'Vuelo lateral',
          notes: '',
          sets: [
            makeSet(14, 15, '', '1.5 min', ''),
            makeSet(14, 15, '', '1.5 min', ''),
            makeSet(14, 13, 2, '1.5 min', '')
          ]
        },
        {
          id: uid(),
          name: 'Abdominales colgado',
          notes: '',
          sets: [
            makeSet(0, 15, '', '', 'Peso corporal'),
            makeSet(0, 15, '', '', 'Peso corporal'),
            makeSet(0, 10, '', '', 'Peso corporal')
          ]
        }
      ];

      const seedNames = exercises.map(function(exercise) {
        return exercise.name.toLowerCase();
      });
      let workout = getWorkoutForDate(DAY_1_SEED_DATE);
      if (!workout) {
        workout = { id: uid(), date: DAY_1_SEED_DATE, title: 'Día 1', notes: '', exercises: [] };
        state.workouts.unshift(workout);
      }

      workout.title = 'Día 1';
      workout.exercises = workout.exercises.filter(function(exercise) {
        return seedNames.indexOf(String(exercise.name || '').toLowerCase()) === -1;
      }).concat(exercises);

      state.dayByDate[DAY_1_SEED_DATE] = '1';
      currentTableDate = DAY_1_SEED_DATE;
      currentTableDay = '1';
      localStorage.setItem(DAY_1_SEED_KEY, '1');
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function seedDay2Workout() {
      if (localStorage.getItem(DAY_2_SEED_KEY)) return;

      const exercises = [
        {
          id: uid(),
          name: 'Sentadillas hack',
          notes: 'Calentamiento con porcentajes aproximados incluido.',
          sets: [
            makeSet(45, 12, '', '', '~30% | 40-50 kg | 10-12 reps | Activación general'),
            makeSet(77.5, 8, '', '', '~50% | 75-80 kg | 6-8 reps | Técnica'),
            makeSet(102.5, 5, '', '', '~65% | 100-105 kg | 4-5 reps | Preparación'),
            makeSet(117.5, 3, '', '', '~75% | 115-120 kg | Activación neural'),
            makeSet(132.5, 2, '', '', '~85% | 130-135 kg | 1-2 reps | Afinar para carga pesada'),
            makeSet(160, 8, '', '', 'Bajar bien'),
            makeSet(160, 8, '', '', ''),
            makeSet(160, 7, 1, '', '')
          ]
        },
        {
          id: uid(),
          name: 'Curl de pie femoral',
          notes: '',
          sets: [
            makeSet(12, 15, '', '1.5 min', ''),
            makeSet(12, 15, '', '1.5 min', ''),
            makeSet(12, 15, 1, '1.5 min', '')
          ]
        },
        {
          id: uid(),
          name: 'Prensa',
          notes: '',
          sets: [
            makeSet(200, 8, '', '3 min', ''),
            makeSet(200, 8, '', '3 min', ''),
            makeSet(200, 8, 1, '3 min', '')
          ]
        },
        {
          id: uid(),
          name: 'Extensora',
          notes: 'Sin pausa.',
          sets: [
            makeSet(60, 15, '', '1 min', ''),
            makeSet(60, 15, '', '1 min', ''),
            makeSet(60, 15, 1, '1 min', '')
          ]
        },
        {
          id: uid(),
          name: 'Pantorrilha en prensa',
          notes: '',
          sets: [
            makeSet(42, 15, '', '', ''),
            makeSet(42, 14, '', '', ''),
            makeSet(42, 15, '', '', ''),
            makeSet(42, 12, '', '', '')
          ]
        },
        {
          id: uid(),
          name: 'Triceps en polea',
          notes: 'Superset con bíceps en polea.',
          sets: [
            makeSet(10, 12, '', '1 min', '10 ladrillos'),
            makeSet(10, 12, '', '1 min', '10 ladrillos'),
            makeSet(10, 10, '', '1 min', '10 ladrillos')
          ]
        },
        {
          id: uid(),
          name: 'Biceps en polea',
          notes: 'Superset con tríceps en polea.',
          sets: [
            makeSet(9, 12, '', '1 min', '9 ladrillos'),
            makeSet(9, 12, '', '1 min', '9 ladrillos'),
            makeSet(9, 10, '', '1 min', '9 ladrillos')
          ]
        }
      ];

      const seedNames = exercises.map(function(exercise) {
        return exercise.name.toLowerCase();
      });
      let workout = getWorkoutForDate(DAY_2_SEED_DATE);
      if (!workout) {
        workout = { id: uid(), date: DAY_2_SEED_DATE, title: 'Día 2', notes: '', exercises: [] };
        state.workouts.unshift(workout);
      }

      workout.title = 'Día 2';
      workout.exercises = workout.exercises.filter(function(exercise) {
        return seedNames.indexOf(String(exercise.name || '').toLowerCase()) === -1;
      }).concat(exercises);

      state.dayByDate[DAY_2_SEED_DATE] = '2';
      currentTableDate = DAY_2_SEED_DATE;
      currentTableDay = '2';
      localStorage.setItem(DAY_2_SEED_KEY, '1');
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function setView(view) {
      activeView = view;
      ['table', 'history', 'backup'].forEach(function(name) {
        document.getElementById('view-' + name).classList.toggle('hidden', name !== view);
        document.getElementById('tab-' + name).classList.toggle('active', name === view);
      });
      render();
    }

    function getAllRows() {
      const rows = [];
      state.workouts.forEach(function(workout) {
        workout.exercises.forEach(function(exercise) {
          exercise.sets.forEach(function(set, index) {
            rows.push({ workout, exercise, set, setNumber: index + 1 });
          });
        });
      });
      return rows.sort(function(a, b) {
        return String(b.workout.date || '').localeCompare(String(a.workout.date || ''));
      });
    }

    function getDefaultTableDate() {
      if (currentTableDate) return currentTableDate;
      const rows = getAllRows();
      if (rows.length > 0) return rows[0].workout.date || todayISO();
      return todayISO();
    }

    function extractDayNumber(title) {
      const text = String(title || '').trim();
      const match = text.match(/\d+/);
      return match ? match[0] : text;
    }

    function getStoredDayForDate(date) {
      const selectedDate = date || getDefaultTableDate();
      return state.dayByDate[selectedDate] || '';
    }

    function getDefaultTableDay() {
      if (currentTableDay !== null && currentTableDay !== undefined) return currentTableDay;
      const selectedDate = getDefaultTableDate();
      return getStoredDayForDate(selectedDate);
    }

    function setStoredDayForDate(date, dayValue) {
      const selectedDate = date || getDefaultTableDate();
      state.dayByDate[selectedDate] = String(dayValue || '').trim();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getDateForDay(dayValue) {
      const day = String(dayValue || '').trim();
      if (!day) return '';

      const dateFromMap = Object.keys(state.dayByDate || {}).find(function(date) {
        return String(state.dayByDate[date] || '').trim() === day;
      });
      if (dateFromMap) return dateFromMap;

      const workout = state.workouts.find(function(w) {
        return extractDayNumber(w.title) === day;
      });
      return workout ? workout.date : '';
    }

    function getWorkoutForDate(date) {
      return state.workouts.find(function(w) {
        return w.date === date;
      });
    }

    function getOrCreateWorkoutForDate(date) {
      let workout = getWorkoutForDate(date);
      if (!workout) {
        const storedDay = getStoredDayForDate(date);
        workout = { id: uid(), date, title: storedDay || 'Día', notes: '', exercises: [] };
        state.workouts.unshift(workout);
      }
      return workout;
    }

    function getRowsForCurrentDate() {
      const selectedDate = getDefaultTableDate();
      return getAllRows().filter(function(r) {
        return r.workout.date === selectedDate;
      });

    function estimated1RM(set) {
      return Number(set.weight || 0) * (1 + Number(set.reps || 0) / 30);
    }

    function valueOrEmpty(value) {
      return value === null || value === undefined ? '' : value;
    }

    function parseRestSeconds(rest) {
      const text = String(rest || '').trim().toLowerCase().replace(',', '.');
      if (!text) return 0;

      const timeMatch = text.match(/(\d+)\s*:\s*(\d{1,2})/);
      if (timeMatch) return (Number(timeMatch[1]) * 60) + Number(timeMatch[2]);

      const numberMatch = text.match(/(\d+(?:\.\d+)?)/);
      if (!numberMatch) return 0;

      const value = Number(numberMatch[1]);
      if (Number.isNaN(value)) return 0;
      if (text.indexOf('seg') !== -1 || text.indexOf('sec') !== -1 || /\bs\b/.test(text)) return Math.round(value);
      return Math.round(value * 60);
    }

    function formatTimerSeconds(seconds) {
      const safeSeconds = Math.max(0, Math.ceil(seconds));
      const mins = Math.floor(safeSeconds / 60);
      const secs = safeSeconds % 60;
      return mins + ':' + String(secs).padStart(2, '0');
    }

    function prepareRestAlert() {
      const AudioContextConstructor = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextConstructor) return;
      if (!restAudioContext) restAudioContext = new AudioContextConstructor();
      if (restAudioContext.state === 'suspended' && restAudioContext.resume) {
        restAudioContext.resume().catch(function(error) {
          console.warn('No se pudo activar el audio:', error);
        });
      }
    }

    function playRestCompleteAlert() {
      if (navigator.vibrate) navigator.vibrate([180, 80, 180]);

      const AudioContextConstructor = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextConstructor) return;
      if (!restAudioContext) restAudioContext = new AudioContextConstructor();
      if (restAudioContext.state === 'suspended' && restAudioContext.resume) {
        restAudioContext.resume().catch(function(error) {
          console.warn('No se pudo reactivar el audio:', error);
        });
      }

      const startAt = restAudioContext.currentTime;
      const oscillator = restAudioContext.createOscillator();
      const gain = restAudioContext.createGain();
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(880, startAt);
      gain.gain.setValueAtTime(0.0001, startAt);
      gain.gain.exponentialRampToValueAtTime(0.16, startAt + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, startAt + 0.45);
      oscillator.connect(gain);
      gain.connect(restAudioContext.destination);
      oscillator.start(startAt);
      oscillator.stop(startAt + 0.5);
    }

    function checkRestTimerCompletion() {
      if (!activeRestTimer || activeRestTimer.notified || activeRestTimer.endAt > Date.now()) return;
      activeRestTimer.notified = true;
      playRestCompleteAlert();
    }

    function getRestTimerInfo(setId, rest) {
      const timer = activeRestTimer && activeRestTimer.setId === setId ? activeRestTimer : null;
      const durationSeconds = parseRestSeconds(rest);
      if (!timer) {
        return {
          className: '',
          label: '',
          progress: 0,
          ariaLabel: durationSeconds ? 'Iniciar descanso de ' + formatTimerSeconds(durationSeconds) : 'Sin descanso configurado'
        };
      }

      const remainingSeconds = (timer.endAt - Date.now()) / 1000;
      if (remainingSeconds <= 0) {
        return { className: ' is-complete', label: '0', progress: 0, ariaLabel: 'Descanso completo. Tocar para reiniciar' };
      }

      const progress = timer.durationSeconds ? Math.max(0, Math.min(100, (remainingSeconds / timer.durationSeconds) * 100)) : 0;
      return {
        className: ' is-running',
        label: String(Math.ceil(remainingSeconds)),
        progress,
        ariaLabel: 'Descanso en curso: ' + formatTimerSeconds(remainingSeconds)
      };
    }

    function updateRestTimerButtons() {
      const buttons = document.querySelectorAll('.set-rest-timer');
      buttons.forEach(function(button) {
        const info = getRestTimerInfo(button.dataset.setId, button.dataset.rest);
        const label = button.querySelector('span');
        if (label) label.textContent = info.label;
        button.setAttribute('aria-label', info.ariaLabel);
        button.setAttribute('title', info.ariaLabel);
        button.style.setProperty('--timer-progress', info.progress + '%');
        button.classList.toggle('is-running', info.className.indexOf('is-running') !== -1);
        button.classList.toggle('is-complete', info.className.indexOf('is-complete') !== -1);
      });
    }

    function ensureRestTimerTicker() {
      if (restTimerInterval) return;
      restTimerInterval = window.setInterval(function() {
        checkRestTimerCompletion();
        updateRestTimerButtons();
      }, 1000);
    }

    function startRestTimer(setId, rest) {
      const durationSeconds = parseRestSeconds(rest);
      prepareRestAlert();
      if (!durationSeconds) return alert('Esta línea no tiene descanso configurado.');

      if (activeRestTimer && activeRestTimer.setId === setId && activeRestTimer.endAt > Date.now()) {
        activeRestTimer = null;
        updateRestTimerButtons();
        return;
      }

      activeRestTimer = { setId, endAt: Date.now() + (durationSeconds * 1000), durationSeconds, notified: false };
      updateRestTimerButtons();
      ensureRestTimerTicker();
    }

    function updateSet(workoutId, exerciseId, setId, sourcePrefix) {

      const date = currentTableDate || document.getElementById('table-date')?.value || document.getElementById(prefix + '-date-' + setId)?.value || document.getElementById('edit-date')?.value || todayISO();
      const workoutTitle = getStoredDayForDate(date) || ref.workout.title || 'Día';

      const weightRaw = String(document.getElementById(prefix + '-weight-' + setId)?.value || document.getElementById('edit-weight')?.value || '').replace(',', '.');
      const repsRaw = String(document.getElementById(prefix + '-reps-' + setId)?.value || document.getElementById('edit-reps')?.value || '').replace(',', '.');
      const rir = document.getElementById(prefix + '-rir-' + setId)?.value || document.getElementById('edit-rir')?.value || '';
      const rest = document.getElementById(prefix + '-rest-' + setId)?.value.trim() || document.getElementById('edit-rest')?.value.trim() || '';
      const notes = document.getElementById(prefix + '-notes-' + setId)?.value.trim() || document.getElementById('edit-notes')?.value.trim() || '';

      if (!exerciseName) return alert('Ingresá el ejercicio.');
      if (!weightRaw || !repsRaw) return alert('Ingresá peso y repeticiones.');

      const weight = Number(weightRaw);
      const reps = Number(repsRaw);
      if (Number.isNaN(weight) || Number.isNaN(reps)) return alert('Peso y repeticiones tienen que ser números válidos.');

      const updatedSet = {
        id: ref.set.id,
        weight,
        reps,
        rir,
        rest,
        notes,
        done: !!ref.set.done
      };

      const sameDate = ref.workout.date === date;
      const sameExercise = String(ref.exercise.name).toLowerCase() === exerciseName.toLowerCase();

      if (sameDate && sameExercise) {
        ref.set.weight = weight;
        ref.set.reps = reps;
        ref.set.rir = rir;
        ref.set.rest = rest;
        ref.set.notes = notes;

        ref.exercise.sets = ref.exercise.sets.filter(function(s) { return s.id !== setId; });

        let targetExercise = targetWorkout.exercises.find(function(ex) {
          return String(ex.name).toLowerCase() === exerciseName.toLowerCase();

    function deleteCurrentDay() {
      const date = currentTableDate || getDefaultTableDate();
      const day = getStoredDayForDate(date) || currentTableDay || '';
      if (!confirm('¿Borrar el Día ' + (day || '') + ' completo?')) return;

      state.workouts = state.workouts.filter(function(workout) {
        return workout.date !== date;
      });
      delete state.dayByDate[date];

      if (activeRestTimer) activeRestTimer = null;
      editingRowId = null;
      draftRowId = null;
      currentTableDate = null;
      currentTableDay = null;
      saveState();
    }

    function renderHistory() {
      const el = document.getElementById('view-history');
      const workoutOptions = [...state.workouts].sort(function(a,b) { return String(b.date || '').localeCompare(String(a.date || '')); });

      if (workoutOptions.length === 0) {
        el.innerHTML = '<div class="card empty">Todavía no hay días para mostrar historial.</div>';
        return;
      }

      el.innerHTML =
        '<div class="card">' +
          '<p class="title">Historial por día</p>' +
          '<label>Elegí un día</label>' +
          '<select id="history-workout">' + workoutOptions.map(function(w) {
            return '<option value="' + escapeHtml(w.id) + '">' + escapeHtml(formatDate(w.date) + ' · ' + w.title) + '</option>';
          }).join('') + '</select>' +
        '</div>' +
        '<div id="history-detail"></div>';

      renderWorkoutHistory();
    }

    function renderWorkoutHistory() {
      const workoutId = document.getElementById('history-workout')?.value;
      const detail = document.getElementById('history-detail');
      if (!workoutId || !detail) return;

      const workout = state.workouts.find(function(w) { return w.id === workoutId; });
      if (!workout) {
        detail.innerHTML = '<div class="card empty">Día no encontrado.</div>';
        return;
      }

      const rows = [];
      workout.exercises.forEach(function(exercise) {
        exercise.sets.forEach(function(set, index) {
          rows.push({
            date: workout.date,
            workout: workout.title,
            exercise: exercise.name,
            setNumber: index + 1,
            weight: Number(set.weight || 0),
            reps: Number(set.reps || 0),
            rest: set.rest || '-',
            rir: set.rir === '' || set.rir == null ? '-' : set.rir,
            notes: set.notes || '',
            estimated: estimated1RM(set)
          });
        });
      });

      detail.innerHTML =
        '<div class="card">' +
          '<div class="toolbar">' +
            '<button type="button" id="btn-show-workout-text" data-workout-id="' + escapeHtml(workout.id) + '">Ver texto del día</button>' +
            '<button type="button" id="btn-copy-workout-text" data-workout-id="' + escapeHtml(workout.id) + '">Copiar texto</button>' +
          '</div>' +
          '<div id="workout-text-output"></div>' +
          '<div class="table-wrap">' +
            '<table class="sheet">' +
              '<thead><tr>' +
                '<th class="col-date">Fecha</th>' +
                '<th class="col-day">Día</th>' +
                '<th>Ejercicio</th>' +
                '<th class="col-series">Serie</th>' +
                '<th>Peso</th>' +
                '<th class="col-reps">Reps</th>' +
                '<th class="col-rest">Descanso</th>' +
                '<th class="col-rir">RIR</th>' +
                '<th>Notas</th>' +
                '<th>Estim. 1RM</th>' +
              '</tr></thead>' +
              '<tbody>' + rows.map(function(r, index) {
                const nextRow = rows[index + 1];
                const isExerciseEnd = !nextRow || nextRow.exercise !== r.exercise;
                const rowClass = isExerciseEnd ? ' class="exercise-end"' : '';
                return '<tr' + rowClass + '>' +
                  '<td class="col-date">' + escapeHtml(formatDate(r.date)) + '</td>' +
                  '<td class="col-day" title="' + escapeHtml(r.workout) + '">' + escapeHtml(r.workout) + '</td>' +
                  '<td>' + escapeHtml(r.exercise) + '</td>' +
                  '<td class="col-series">' + r.setNumber + '</td>' +
                  '<td>' + escapeHtml(r.weight) + ' kg</td>' +
                  '<td class="col-reps">' + escapeHtml(r.reps) + '</td>' +
                  '<td class="col-rest" title="' + escapeHtml(r.rest) + '">' + escapeHtml(r.rest) + '</td>' +
                  '<td class="col-rir">' + escapeHtml(r.rir) + '</td>' +
                  '<td>' + escapeHtml(r.notes) + '</td>' +
                  '<td>' + escapeHtml(r.estimated.toFixed(1)) + ' kg</td>' +
                '</tr>';
              }).join('') + '</tbody>' +
            '</table>' +
          '</div>' +
        '</div>';
    }

    function buildWorkoutText(workoutId) {
      const workout = state.workouts.find(function(w) { return w.id === workoutId; });
      if (!workout) return 'Día no encontrado.';

      const lines = [];
      lines.push(formatDate(workout.date) + ' - ' + workout.title);
      lines.push('');

      workout.exercises.forEach(function(exercise) {
        lines.push(exercise.name);
        if (exercise.notes) lines.push('Notas ejercicio: ' + exercise.notes);

        exercise.sets.forEach(function(set, index) {
          const parts = [];
          parts.push((index + 1) + ') ' + Number(set.weight || 0) + ' kg x ' + Number(set.reps || 0));
          if (set.rest) parts.push('descanso ' + set.rest);
          if (set.rir !== '' && set.rir != null) parts.push('RIR ' + set.rir);
          if (set.notes) parts.push('nota: ' + set.notes);
          lines.push(parts.join(' | '));
        });

        lines.push('');
      });

      if (workout.notes) {
        lines.push('Notas del día:');
        lines.push(workout.notes);
      }

      return lines.join('\n').trim();
    }

    function showWorkoutText(workoutId) {
      const output = document.getElementById('workout-text-output');
      if (!output) return;
      output.innerHTML = '';
      const textarea = document.createElement('textarea');
      textarea.className = 'text-output';
      textarea.readOnly = true;
      textarea.value = buildWorkoutText(workoutId);
      output.appendChild(textarea);
    }

    async function copyWorkoutText(workoutId) {
      const text = buildWorkoutText(workoutId);
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
          alert('Texto copiado.');
          return;
        }
      } catch (error) {
        console.warn('Clipboard API falló:', error);
      }
      showWorkoutText(workoutId);
      const textarea = document.querySelector('#workout-text-output textarea');
      if (textarea) {
        textarea.focus();
        textarea.select();
      }
      alert('No pude copiar automáticamente. Seleccioné el texto para copiarlo manualmente.');
    }

    function renderBackup() {
      const el = document.getElementById('view-backup');
      el.innerHTML =
        '<div class="card">' +
          '<p class="title">Backup y exportación</p>' +
          '<p class="small muted">Los datos se guardan en este navegador usando localStorage. Si borrás datos de Safari/Chrome, podés perderlos. Exportá un backup periódicamente.</p>' +
          '<div class="actions">' +
            '<button class="primary" id="btn-export-json" type="button">Exportar JSON</button>' +
            '<button id="btn-export-csv-backup" type="button">Exportar CSV</button>' +
          '</div>' +
        '</div>' +
        '<div class="card">' +
          '<p class="title">Importar backup JSON</p>' +
          '<input type="file" id="import-file" accept="application/json" />' +
          '<div class="actions">' +
            '<button id="btn-import-json" type="button">Importar</button>' +
            '<button class="danger" id="btn-clear-data" type="button">Borrar todo</button>' +
          '</div>' +
        '</div>';
    }

    function downloadBackup() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      downloadBlob(blob, 'gym-log-backup-' + todayISO() + '.json');
    }

    function downloadCSV() {
      const rows = [['fecha','dia','ejercicio','peso','reps','rir','descanso','notas_serie','notas_ejercicio','notas_dia']];
      state.workouts.forEach(function(w) {
        w.exercises.forEach(function(ex) {
          ex.sets.forEach(function(s) {
            rows.push([w.date, w.title, ex.name, s.weight, s.reps, s.rir, s.rest, s.notes, ex.notes, w.notes]);
          });
        });
      });
      const csv = rows.map(function(row) { return row.map(csvEscape).join(','); }).join('\n');
      downloadBlob(new Blob([csv], { type: 'text/csv;charset=utf-8' }), 'gym-log-' + todayISO() + '.csv');
    }

    function csvEscape(value) {
      const str = String(value == null ? '' : value);
      return '"' + str.replaceAll('"', '""') + '"';
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function importBackup() {
      const file = document.getElementById('import-file')?.files?.[0];
      if (!file) return alert('Seleccioná un archivo JSON.');
      const reader = new FileReader();
      reader.onload = function() {
        try {
          const data = JSON.parse(reader.result);
          if (!data.workouts || !Array.isArray(data.workouts)) throw new Error('Formato inválido');
          state = normalizeState(data);
          saveState();
          alert('Backup importado correctamente.');
        } catch (error) {
          alert('No se pudo importar. El archivo no parece válido.');
        }
      };
      reader.readAsText(file);
    }

    function clearAllData() {
      if (!confirm('¿Borrar todos los datos de la app?')) return;
      state = { workouts: [], dayByDate: {} };
      lastQuickRowStatus = '';
      editingRowId = null;
      draftRowId = null;
      saveState();
    }

    function render() {
      if (activeView === 'table') renderTable();
      if (activeView === 'history') renderHistory();
      if (activeView === 'backup') renderBackup();
    }

    function runTests() {
      console.assert(formatDate('2026-05-27') === '27/05/26', 'formatDate debe usar año de 2 dígitos');
      console.assert(escapeHtml('<x>&"\'') === '&lt;x&gt;&amp;&quot;&#039;', 'escapeHtml debe escapar HTML');
      const sample = { weight: 100, reps: 5 };
      console.assert(Math.abs(estimated1RM(sample) - 116.6666667) < 0.001, 'estimated1RM debe calcular Epley básico');
      console.assert(parseRestSeconds('3 min') === 180, 'parseRestSeconds debe interpretar minutos');
      console.assert(parseRestSeconds('90 seg') === 90, 'parseRestSeconds debe interpretar segundos');
      console.assert(parseRestSeconds('1:30') === 90, 'parseRestSeconds debe interpretar mm:ss');
      console.assert(formatTimerSeconds(180) === '3:00', 'formatTimerSeconds debe usar m:ss');
      const previousState = state;
      state = { dayByDate: {}, workouts: [{ id: 'w1', date: '2026-05-27', title: 'Día 1', notes: '', exercises: [{ id: 'e1', name: 'Press <plano>', notes: '', sets: [{ id: 's1', weight: 100, reps: 5, rir: 1, rest: '3 min', notes: 'ok' }] }] }] };
      const text = buildWorkoutText('w1');
      console.assert(text.includes('Press <plano>'), 'buildWorkoutText debe preservar texto plano');
      console.assert(text.includes('100 kg x 5'), 'buildWorkoutText debe incluir peso y reps');
      currentTableDate = '2026-05-27';
      const defaults = getLastQuickRowDefaults();
      console.assert(defaults.weight === 100, '+ debe traer el peso de la línea anterior');
      console.assert(defaults.rest === '3 min', '+ debe traer el descanso de la línea anterior');
      currentTableDate = null;
      state = previousState;
    }

    document.addEventListener('click', function(event) {
      const target = event.target;
      if (!target) return;

      if (target.id === 'tab-table') setView('table');
      if (target.id === 'tab-history') setView('history');
      if (target.id === 'tab-backup') setView('backup');
      if (target.id === 'btn-show-quick-row') createDraftRow();
      if (target.id === 'btn-save-quick-row') addQuickRow();
      if (target.id === 'btn-cancel-quick-row') renderTable();
      if (target.id === 'btn-export-csv-backup') downloadCSV();
      if (target.id === 'btn-export-json') downloadBackup();
      if (target.id === 'btn-import-json') importBackup();
      if (target.id === 'btn-clear-data') clearAllData();
      if (target.id === 'btn-delete-day') deleteCurrentDay();

      if (target.classList.contains('btn-edit-set')) {
        showEditSeriesPanel(target.dataset.workoutId, target.dataset.exerciseId, target.dataset.setId);
      }

      if (target.classList.contains('btn-save-inline-set')) {
        updateSet(target.dataset.workoutId, target.dataset.exerciseId, target.dataset.setId, 'inline');
      }

      if (target.classList.contains('btn-save-edit-set')) {
        updateSet(target.dataset.workoutId, target.dataset.exerciseId, target.dataset.setId, 'edit');
      }

      if (target.classList.contains('btn-cancel-inline-set')) {
        if (draftRowId && editingRowId === draftRowId) {
          removeDraftRow(draftRowId);
          draftRowId = null;
        }
        editingRowId = null;
        renderTable();
      }

      if (target.classList.contains('btn-delete-set')) {
        deleteSet(target.dataset.workoutId, target.dataset.exerciseId, target.dataset.setId);
      }

      if (target.classList.contains('set-rest-timer')) {
        startRestTimer(target.dataset.setId, target.dataset.rest);
      }

      if (target.id === 'btn-show-workout-text') showWorkoutText(target.dataset.workoutId);
      if (target.id === 'btn-copy-workout-text') copyWorkoutText(target.dataset.workoutId);
    });

    document.addEventListener('change', function(event) {
      if (event.target && event.target.id === 'history-workout') renderWorkoutHistory();
      if (event.target && event.target.id === 'table-date') {
        currentTableDate = event.target.value || todayISO();
        currentTableDay = null;
        editingRowId = null;
        draftRowId = null;
        renderTable();
      }
      if (event.target && event.target.id === 'table-day') {
        currentTableDay = event.target.value || '';
        const matchingDate = getDateForDay(currentTableDay);
        if (matchingDate) {
          currentTableDate = matchingDate;
          editingRowId = null;
          draftRowId = null;
          renderTable();
        } else {
          setStoredDayForDate(currentTableDate || todayISO(), currentTableDay);
        }
      }
    });

    window.addEventListener('DOMContentLoaded', function() {
      runTests();
      seedDay1Workout();
      seedDay2Workout();
      setView('table');
    });
  </script>
</body>
</html>
