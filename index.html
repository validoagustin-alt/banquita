<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gym Log" />
  <title>Gym Log iPhone</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #181b22;
      --card-2: #20242e;
      --text: #f4f6fb;
      --muted: #a5adba;
      --border: #303642;
      --accent: #6ea8fe;
      --danger: #ff6b6b;
      --ok: #7ee787;
      --shadow: 0 10px 30px rgba(0,0,0,.25);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    html {
      background: #000;
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #000;
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, #0f1115 0%, #111722 100%);
    }

    header {
      position: sticky;
      top: env(safe-area-inset-top);
      z-index: 10;
      padding: 18px 16px 12px;
      background: rgba(15, 17, 21, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .topbar {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    main {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }

    button, input, textarea, select { font: inherit; }

    button {
      border: 0;
      border-radius: 14px;
      padding: 11px 14px;
      color: var(--text);
      background: var(--card-2);
      cursor: pointer;
      min-height: 44px;
    }

    button.primary {
      background: var(--accent);
      color: #07101f;
      font-weight: 700;
    }

    button.danger {
      background: rgba(255, 107, 107, .14);
      color: var(--danger);
      border: 1px solid rgba(255, 107, 107, .32);
    }

    button.ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    button.edit {
      background: rgba(126, 231, 135, .16);
      color: var(--ok);
      border: 1px solid rgba(126, 231, 135, .38);
      font-weight: 800;
    }

    button.add-line {
      background: var(--ok);
      color: #07130a;
      border: 1px solid rgba(126, 231, 135, .65);
      font-weight: 900;
      font-size: 20px;
    }

    .card {
      background: rgba(24, 27, 34, .92);
      border: 1px solid rgba(255,255,255,.07);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 14px;
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin: 0 0 6px;
    }

    input, textarea, select {
      width: 100%;
      background: #10141c;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 12px;
      outline: none;
      min-height: 44px;
    }

    textarea { min-height: 78px; resize: vertical; }

    .muted { color: var(--muted); }
    .small { font-size: 13px; }
    .title { font-weight: 800; font-size: 18px; margin: 0 0 4px; }
    .subtitle { color: var(--muted); font-size: 13px; margin: 0; }

    .actions, .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 12px;
      margin-bottom: 12px;
    }

    .hidden { display: none !important; }

    nav.tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    nav.tabs button.active {
      background: var(--accent);
      color: #07101f;
      font-weight: 800;
    }

    .empty {
      text-align: center;
      padding: 28px 14px;
      color: var(--muted);
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #10141c;
    }

    table.sheet {
      width: max-content;
      min-width: 100%;
      table-layout: auto;
      border-collapse: collapse;
      font-size: 12px;
    }

    table.sheet th,
    table.sheet td {
      border-bottom: 1px solid rgba(255,255,255,.08);
      border-right: 1px solid rgba(255,255,255,.06);
      padding: 4px 6px;
      text-align: left;
      white-space: nowrap;
      line-height: 1.15;
    }

    table.sheet th {
      position: sticky;
      top: 0;
      background: #171c26;
      color: var(--muted);
      font-size: 11px;
      z-index: 1;
      padding-top: 5px;
      padding-bottom: 5px;
    }

    table.sheet tr.exercise-end td {
      border-bottom: 3px solid rgba(244, 246, 251, .28);
    }

    table.sheet td button {
      min-height: 28px;
      padding: 3px 7px;
      border-radius: 8px;
      font-size: 11px;
    }

    table.sheet input.inline-edit {
      min-height: 24px;
      padding: 3px 5px;
      border-radius: 6px;
      font-size: 11px;
      min-width: 44px;
    }

    .btn-save-inline {
      background: var(--ok);
      color: #07130a;
      border: 1px solid rgba(126, 231, 135, .65);
      font-weight: 900;
    }

    .col-date { min-width: max-content; padding-left: 4px !important; padding-right: 4px !important; }
    .col-day { min-width: max-content; padding-left: 4px !important; padding-right: 4px !important; }
    .col-series { min-width: max-content; text-align: center !important; padding-left: 4px !important; padding-right: 4px !important; font-size: 10px; }
    .col-reps { min-width: max-content; text-align: center !important; padding-left: 4px !important; padding-right: 4px !important; }
    .col-rest { min-width: max-content; padding-left: 4px !important; padding-right: 4px !important; }
    .col-rir { min-width: max-content; text-align: center !important; padding-left: 4px !important; padding-right: 4px !important; }
    .col-action { min-width: max-content; text-align: center !important; padding-left: 3px !important; padding-right: 3px !important; }
    .col-action button { min-width: 22px; min-height: 24px; padding: 2px 5px; border-radius: 7px; font-size: 10px; margin: 0 1px; }

    .exercise-cell {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .set-rest-timer {
      --timer-progress: 0%;
      width: 30px;
      height: 30px;
      min-width: 30px;
      min-height: 30px;
      flex: 0 0 30px;
      padding: 0;
      border-radius: 50%;
      border: 1px solid rgba(165, 173, 186, .72);
      background: transparent;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .set-rest-timer::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: #10141c;
      z-index: 0;
    }

    .set-rest-timer span {
      position: relative;
      z-index: 1;
    }

    .set-rest-timer.is-running {
      background: conic-gradient(#9fd8a8 var(--timer-progress), transparent 0);
      border-color: #9fd8a8;
      color: var(--text);
    }

    .set-rest-timer.is-running::after {
      background: #10141c;
    }

    .set-rest-timer.is-complete {
      border-color: #9fd8a8;
    }

    .set-rest-timer.is-complete::after {
      background: #9fd8a8;
    }

    .exercise-name {
      overflow: visible;
      text-overflow: clip;
    }

    table.sheet th:nth-child(1), table.sheet td:nth-child(1) { min-width: max-content; }
    table.sheet th:nth-child(7), table.sheet td:nth-child(7) { min-width: max-content; }
    table.sheet th:nth-child(10), table.sheet td:nth-child(10) { min-width: max-content; }


    .table-date-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      margin-bottom: 10px;
    }

    .table-date-row label {
      margin: 0;
      font-size: 11px;
    }

    .btn-delete-day {
      min-height: 30px;
      padding: 4px 8px;
      border-radius: 9px;
      font-size: 11px;
      line-height: 1;
    }

    .quick-row-panel {
      box-shadow: none;
      margin-top: 10px;
    }

    .quick-field-stack {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .quick-metrics-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .quick-metrics-row input {
      padding-left: 8px;
      padding-right: 8px;
    }

    input.compact-date {
      width: 138px;
      min-height: 32px;
      height: 32px;
      padding: 4px 7px;
      border-radius: 9px;
      font-size: 12px;
    }

    input.compact-day {
      width: 58px;
      min-height: 32px;
      height: 32px;
      padding: 4px 7px;
      border-radius: 9px;
      font-size: 12px;
      text-align: center;
    }

    .text-output {
      width: 100%;
      min-height: 220px;
      margin-top: 12px;
      background: #0b0f16;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.35;
      white-space: pre-wrap;
    }

    body {
      background:
        radial-gradient(circle at 12% -8%, rgba(46, 229, 157, .22), transparent 34%),
        radial-gradient(circle at 92% 6%, rgba(86, 164, 255, .18), transparent 30%),
        #07090c;
    }

    body::before {
      background:
        linear-gradient(180deg, rgba(7, 9, 12, .88) 0%, rgba(8, 13, 18, .96) 48%, #07090c 100%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.025) 0 1px, transparent 1px 22px);
    }

    header {
      position: relative;
      top: auto;
      padding: 14px 16px 10px;
      background: rgba(7, 9, 12, .78);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    h1 {
      font-size: 18px;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    main {
      padding: 12px 12px 24px;
    }

    .subtitle {
      font-size: 12px;
    }

    button,
    input,
    textarea,
    select,
    .card {
      border-radius: 8px;
    }

    button {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
    }

    button.primary,
    button.add-line,
    nav.tabs button.active {
      background: #2ee59d;
      color: #04100b;
      border-color: rgba(46, 229, 157, .72);
      box-shadow: 0 8px 26px rgba(46, 229, 157, .22);
    }

    nav.tabs {
      position: relative;
      z-index: 2;
      padding: 5px;
      background: rgba(14, 18, 24, .78);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px;
      backdrop-filter: blur(14px);
    }

    nav.tabs button {
      min-height: 38px;
      padding: 8px 10px;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
    }

    .app-hero {
      position: relative;
      overflow: hidden;
      padding: 16px;
      border: 1px solid rgba(255,255,255,.1);
      background:
        linear-gradient(135deg, rgba(46,229,157,.16), rgba(86,164,255,.09)),
        rgba(13, 18, 24, .92);
      box-shadow: 0 18px 54px rgba(0,0,0,.34);
    }

    .app-hero::after {
      content: "";
      position: absolute;
      right: -48px;
      top: -44px;
      width: 132px;
      height: 132px;
      border: 1px solid rgba(46,229,157,.28);
      border-radius: 50%;
      box-shadow: inset 0 0 0 18px rgba(255,255,255,.025);
    }

    .hero-top {
      position: relative;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding-right: 0;
      z-index: 1;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: #8ed9ff;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .hero-title {
      margin: 0;
      font-size: 34px;
      line-height: .95;
      font-weight: 900;
      letter-spacing: 0;
    }

    .hero-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .day-control {
      width: 92px;
      padding: 9px;
      background: rgba(14, 18, 24, .88);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 34px rgba(0,0,0,.34);
    }

    .floating-day-control {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 10px);
      right: 12px;
      z-index: 100;
      isolation: isolate;
      transform: translateZ(0);
      opacity: 0;
      pointer-events: none;
      transition: opacity .16s ease, transform .16s ease;
    }

    body.day-is-floating .floating-day-control {
      opacity: 1;
      pointer-events: auto;
      transform: translateZ(0) translateY(0);
    }

    .hero-day-control {
      flex: 0 0 auto;
    }

    .day-control label {
      margin-bottom: 4px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .day-control input,
    .day-picker-button {
      height: 36px;
      min-height: 36px;
      padding: 4px;
      border: 0;
      background: transparent;
      color: var(--text);
      font-size: 24px;
      font-weight: 900;
      text-align: center;
      width: 100%;
    }

    .day-picker-button {
      cursor: pointer;
      border-radius: 7px;
    }

    .day-menu {
      position: fixed;
      z-index: 220;
      min-width: 126px;
      padding: 6px;
      background: rgba(14, 18, 24, .96);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 10px;
      box-shadow: 0 18px 42px rgba(0,0,0,.42);
      backdrop-filter: blur(16px);
    }

    .day-menu button {
      display: block;
      width: 100%;
      min-height: 36px;
      padding: 8px 10px;
      border-radius: 7px;
      background: transparent;
      color: var(--text);
      text-align: left;
      font-size: 13px;
      font-weight: 800;
    }

    .day-menu button.active {
      background: #2ee59d;
      color: #04100b;
    }

    .stats-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 16px;
    }

    .stat-tile {
      padding: 10px;
      background: rgba(3, 8, 12, .42);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
    }

    .stat-value {
      display: block;
      font-size: 20px;
      line-height: 1;
      font-weight: 900;
    }

    .stat-label {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .workout-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin: 12px 0;
    }

    .workout-actions button {
      margin: 0;
    }

    .feed {
      display: grid;
      gap: 10px;
    }

    .exercise-card {
      padding: 12px;
      background: rgba(15, 20, 27, .94);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 12px 36px rgba(0,0,0,.28);
    }

    .exercise-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .exercise-index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      margin-right: 8px;
      color: #07130f;
      background: #2ee59d;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 900;
      vertical-align: middle;
    }

    .exercise-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.15;
      font-weight: 900;
    }

    .exercise-meta {
      margin: 4px 0 0 34px;
      color: var(--muted);
      font-size: 12px;
    }

    .exercise-volume {
      padding: 7px 9px;
      color: #8ed9ff;
      background: rgba(86,164,255,.1);
      border: 1px solid rgba(86,164,255,.18);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .volume-bar {
      height: 4px;
      margin: 0 0 10px 34px;
      overflow: hidden;
      background: rgba(255,255,255,.06);
      border-radius: 999px;
    }

    .volume-bar span {
      display: block;
      height: 100%;
      width: var(--volume-width);
      background: linear-gradient(90deg, #2ee59d, #56a4ff);
      border-radius: inherit;
    }

    .day-note {
      position: relative;
      z-index: 1;
      margin: 12px 0 0;
      padding: 9px 10px;
      color: var(--muted);
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 8px;
      font-size: 12px;
    }

    .set-list {
      display: grid;
      gap: 7px;
    }

    .set-row {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      align-items: center;
      gap: 8px;
      min-height: 54px;
      padding: 8px;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 8px;
    }

    .set-row.is-editing {
      grid-template-columns: 1fr;
      align-items: stretch;
      background: rgba(46,229,157,.08);
      border-color: rgba(46,229,157,.28);
    }

    .set-row.is-warmup {
      background: rgba(255,255,255,.045);
      border-color: rgba(255,255,255,.07);
      box-shadow: none;
    }

    .set-row.is-warmup .set-weight {
      color: #b6bec9;
    }

    .set-main {
      min-width: 0;
    }

    .set-performance {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }

    .set-weight {
      font-size: 20px;
      line-height: 1;
      font-weight: 900;
    }

    .set-reps {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .set-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 6px;
    }

    .tag {
      padding: 3px 6px;
      color: var(--muted);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.2;
    }

    .tag.note {
      color: var(--muted);
      background: transparent;
      border-color: transparent;
      padding-left: 0;
      padding-right: 0;
    }

    .tag.warmup {
      color: #181002;
      background: #c79d26;
      border-color: #c79d26;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .set-actions {
      display: flex;
      gap: 5px;
    }

    .set-actions button {
      min-width: 34px;
      min-height: 34px;
      padding: 4px 8px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 900;
    }

    .set-edit-grid {
      display: grid;
      grid-template-columns: 1.3fr .7fr .7fr;
      gap: 7px;
    }

    .set-edit-grid.wide {
      grid-template-columns: .8fr .8fr 1fr;
      margin-top: 7px;
    }

    .set-edit-grid input {
      min-height: 40px;
      padding: 8px;
      border-radius: 7px;
    }

    .set-edit-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 7px;
      margin-top: 8px;
    }

    .quick-row-panel {
      background: rgba(15, 20, 27, .98);
      border-color: rgba(46,229,157,.26);
    }

    @media (max-width: 430px) {
      main { padding: 12px; }
      .row, .row-3 { grid-template-columns: 1fr; }
      h1 { font-size: 22px; }
      .quick-metrics-row { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .hero-title { font-size: 31px; }
      .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stat-value { font-size: 18px; }
      .set-edit-grid,
      .set-edit-grid.wide { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>Gym Log</h1>
        <p class="subtitle">Días, series, peso, RIR y notas</p>
      </div>
    </div>
  </header>

  <main>
    <nav class="tabs">
      <button id="tab-table" class="active" type="button">Entrenos</button>

          '<pre class="text-output">' + String(error && (error.message || error) || 'Error desconocido') + '</pre>' +
        '</div>';
    }

    function uid() {
      if (window.crypto && typeof window.crypto.randomUUID === 'function') return window.crypto.randomUUID();
      return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2);
    }

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function formatDate(iso) {
      if (!iso) return '';
      const parts = String(iso).split('-');
      if (parts.length !== 3) return String(iso);
      const y = parts[0];
      const m = parts[1];
      const d = parts[2];
      return d + '/' + m + '/' + String(y).slice(-2);
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getValue(id) {
      const el = document.getElementById(id);
      return el ? el.value : '';
    }

    function getTrimmedValue(id) {
      return String(getValue(id) || '').trim();
    }

    function normalizeState(data) {
      if (!data || !Array.isArray(data.workouts)) data = { workouts: [] };
      if (!data.dayByDate || typeof data.dayByDate !== 'object') data.dayByDate = {};
      if (typeof data.lastTableDate !== 'string') data.lastTableDate = '';
      data.workouts.forEach(function(workout) {
        (workout.exercises || []).forEach(function(exercise) {
          (exercise.sets || []).forEach(function(set) {
            if (typeof set.done !== 'boolean') set.done = false;
          });
        });
      });
      return data;
    }

    function storageGet(key) {
      try {
        return window.localStorage ? window.localStorage.getItem(key) : null;
      } catch (error) {
        console.warn('No se pudo leer localStorage:', error);
        return null;
      }
    }

    function storageSet(key, value) {
      try {
        if (window.localStorage) window.localStorage.setItem(key, value);
      } catch (error) {
        console.warn('No se pudo guardar en localStorage:', error);
      }
    }

    function loadState() {
      try {
        const raw = storageGet(STORAGE_KEY) || storageGet('gym-log-v1');
        const parsed = raw ? JSON.parse(raw) : { workouts: [] };
        if (!parsed || !Array.isArray(parsed.workouts)) return { workouts: [] };
        return parsed;
      } catch (error) {
        console.warn('No se pudo cargar el estado:', error);
        return { workouts: [] };
      }
    }

    function scrollToSetRow(setId) {
      if (!setId) return;
      window.requestAnimationFrame(function() {
        const rows = document.querySelectorAll('.set-row');
        let target = null;
        rows.forEach(function(row) {
          if (row.dataset.setId === setId) target = row;
        });
        if (target) target.scrollIntoView({ block: 'center', inline: 'nearest' });
      });
    }

    function saveState(scrollToSetId) {
      rememberTableDate(currentTableDate);
      storageSet(STORAGE_KEY, JSON.stringify(state));
      render();
      scrollToSetRow(scrollToSetId);
    }

    function loadObjective() {
      try {
        const raw = storageGet(OBJECTIVE_KEY);
        if (!raw) return { goal: '', frequency: '', constraints: '', notes: '' };
        const parsed = JSON.parse(raw);
        return {
          goal: parsed.goal || '',
          frequency: parsed.frequency || '',
          constraints: parsed.constraints || '',
          notes: parsed.notes || ''
        };
      } catch (error) {
        console.warn('No se pudo cargar el objetivo:', error);
        return { goal: '', frequency: '', constraints: '', notes: '' };
      }
    }

    function saveObjective() {
      const objective = {
        goal: getTrimmedValue('objective-goal'),
        frequency: getTrimmedValue('objective-frequency'),
        constraints: getTrimmedValue('objective-constraints'),
        notes: getTrimmedValue('objective-notes')
      };
      storageSet(OBJECTIVE_KEY, JSON.stringify(objective));
      const output = document.getElementById('objective-output');
      if (output) output.innerHTML = '<div class="card" style="box-shadow:none; border-color:rgba(126,231,135,.35); color:var(--ok)">Objetivo guardado.</div>';
    }

    function buildTrainingSummary() {
      const objective = loadObjective();
      const workouts = state.workouts.slice().sort(function(a, b) {
        return String(a.date || '').localeCompare(String(b.date || ''));
      }).map(function(workout) {
        return {
          fecha: workout.date,
          dia: state.dayByDate[workout.date] || extractDayNumber(workout.title) || workout.title || '',
          ejercicios: (workout.exercises || []).map(function(exercise) {
            return {
              nombre: exercise.name,
              notas: exercise.notes || '',
              series: (exercise.sets || []).map(function(set, index) {
                return {
                  serie: index + 1,
                  peso: set.weight,
                  reps: set.reps,
                  rir: set.rir,
                  descanso: set.rest,
                  notas: set.notes
                };
              })
            };
          })
        };
      });

      return {
        objetivo: objective,
        historial: workouts,
        instruccion: 'Generar la proxima semana como JSON estructurado. No guardar automaticamente; mostrar para revision del usuario.'
      };
    }

        weight,

        rir: rir == null ? '' : rir,
        rest: rest || '',
        notes: notes || '',
        done: false
      };
    }

    function setView(view) {
      activeView = view;
      ['table', 'goal', 'history', 'backup'].forEach(function(name) {
        document.getElementById('view-' + name).classList.toggle('hidden', name !== view);
        document.getElementById('tab-' + name).classList.toggle('active', name === view);
      });
      render();
    }

    function getAllRows() {
      const rows = [];
      state.workouts.forEach(function(workout) {
        workout.exercises.forEach(function(exercise) {
          exercise.sets.forEach(function(set, index) {
            rows.push({ workout, exercise, set, setNumber: index + 1 });
          });
        });
      });
      return rows.sort(function(a, b) {
        return String(b.workout.date || '').localeCompare(String(a.workout.date || ''));
      });
    }

    function getDefaultTableDate() {
      if (currentTableDate) return currentTableDate;
      if (isLoadedTableDate(state.lastTableDate)) return state.lastTableDate;
      const rows = getAllRows();
      if (rows.length > 0) return rows[0].workout.date || todayISO();
      return todayISO();
    }

    function extractDayNumber(title) {
      const text = String(title || '').trim();
      const match = text.match(/\d+/);
      return match ? match[0] : text;
    }

    function getStoredDayForDate(date) {
      const selectedDate = date || getDefaultTableDate();
      return state.dayByDate[selectedDate] || '';
    }

    function isLoadedTableDate(date) {
      if (!date) return false;
      return state.workouts.some(function(workout) {
        return workout.date === date;
      });
    }

    function rememberTableDate(date, persist) {
      if (!isLoadedTableDate(date)) return;
      state.lastTableDate = date;
      if (persist) storageSet(STORAGE_KEY, JSON.stringify(state));
    }

    function restoreLastTableSelection() {
      if (!isLoadedTableDate(state.lastTableDate)) return;
      currentTableDate = state.lastTableDate;
      currentTableDay = getStoredDayForDate(currentTableDate) || extractDayNumber(getWorkoutForDate(currentTableDate)?.title) || '';
    }

    function getDefaultTableDay() {
      if (currentTableDay !== null && currentTableDay !== undefined) return currentTableDay;
      const selectedDate = getDefaultTableDate();
      return getStoredDayForDate(selectedDate);
    }

    function setStoredDayForDate(date, dayValue) {
      const selectedDate = date || getDefaultTableDate();
      state.dayByDate[selectedDate] = String(dayValue || '').trim();
      rememberTableDate(selectedDate);
      storageSet(STORAGE_KEY, JSON.stringify(state));
    }

    function getDateForDay(dayValue) {
      const day = String(dayValue || '').trim();
      if (!day) return '';

      const dateFromMap = Object.keys(state.dayByDate || {}).find(function(date) {
        return String(state.dayByDate[date] || '').trim() === day;
      });
      if (dateFromMap) return dateFromMap;

      const workout = state.workouts.find(function(w) {
        return extractDayNumber(w.title) === day;
      });
      return workout ? workout.date : '';
    }

    function getLoadedDays() {
      return state.workouts.map(function(workout) {
        return {
          date: workout.date,
          day: state.dayByDate[workout.date] || extractDayNumber(workout.title) || workout.title || workout.date
        };
      }).filter(function(item) {
        return item.date && item.day !== '';
      }).sort(function(a, b) {
        const dayA = Number(a.day);
        const dayB = Number(b.day);
        if (!Number.isNaN(dayA) && !Number.isNaN(dayB)) return dayA - dayB;
        return String(a.day).localeCompare(String(b.day));
      });
    }

    function getWorkoutForDate(date) {
      return state.workouts.find(function(w) {
        return w.date === date;
      });
    }

    function getOrCreateWorkoutForDate(date) {
      let workout = getWorkoutForDate(date);
      if (!workout) {
        const storedDay = getStoredDayForDate(date);
        workout = { id: uid(), date, title: storedDay || 'Día', notes: '', exercises: [] };
        state.workouts.unshift(workout);
      }
      return workout;
    }

    function getRowsForCurrentDate() {
      const selectedDate = getDefaultTableDate();
      return getAllRows().filter(function(r) {
        return r.workout.date === selectedDate;
      });
    }

    function estimated1RM(set) {
      return Number(set.weight || 0) * (1 + Number(set.reps || 0) / 30);
    }

    function valueOrEmpty(value) {
      return value === null || value === undefined ? '' : value;
    }

    function parseRestSeconds(rest) {
      const text = String(rest || '').trim().toLowerCase().replace(',', '.');
      if (!text) return 0;

      const timeMatch = text.match(/(\d+)\s*:\s*(\d{1,2})/);
      if (timeMatch) return (Number(timeMatch[1]) * 60) + Number(timeMatch[2]);

      const numberMatch = text.match(/(\d+(?:\.\d+)?)/);
      if (!numberMatch) return 0;

      const value = Number(numberMatch[1]);
      if (Number.isNaN(value)) return 0;
      if (text.indexOf('seg') !== -1 || text.indexOf('sec') !== -1 || /\bs\b/.test(text)) return Math.round(value);
      return Math.round(value * 60);
    }

    function formatTimerSeconds(seconds) {
      const safeSeconds = Math.max(0, Math.ceil(seconds));
      const mins = Math.floor(safeSeconds / 60);
      const secs = safeSeconds % 60;
      return mins + ':' + String(secs).padStart(2, '0');
    }

    function prepareRestAlert() {
      const AudioContextConstructor = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextConstructor) return;
      if (!restAudioContext) restAudioContext = new AudioContextConstructor();
      if (restAudioContext.state === 'suspended' && restAudioContext.resume) {
        restAudioContext.resume().catch(function(error) {
          console.warn('No se pudo activar el audio:', error);
        });
      }
    }

    function playRestCompleteAlert() {
      if (navigator.vibrate) navigator.vibrate([180, 80, 180]);

      const AudioContextConstructor = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextConstructor) return;
      if (!restAudioContext) restAudioContext = new AudioContextConstructor();
      if (restAudioContext.state === 'suspended' && restAudioContext.resume) {
        restAudioContext.resume().catch(function(error) {
          console.warn('No se pudo reactivar el audio:', error);
        });
      }

      const startAt = restAudioContext.currentTime;
      const oscillator = restAudioContext.createOscillator();
      const gain = restAudioContext.createGain();
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(880, startAt);
      gain.gain.setValueAtTime(0.0001, startAt);
      gain.gain.exponentialRampToValueAtTime(0.16, startAt + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, startAt + 0.45);
      oscillator.connect(gain);
      gain.connect(restAudioContext.destination);
      oscillator.start(startAt);
      oscillator.stop(startAt + 0.5);
    }

    function checkRestTimerCompletion() {
      if (!activeRestTimer || activeRestTimer.notified || activeRestTimer.endAt > Date.now()) return;
      activeRestTimer.notified = true;
      playRestCompleteAlert();
    }

    function getRestTimerInfo(setId, rest) {
      const timer = activeRestTimer && activeRestTimer.setId === setId ? activeRestTimer : null;
      const durationSeconds = parseRestSeconds(rest);
      if (!timer) {
        return {
          className: '',
          label: '',
          progress: 0,
          ariaLabel: durationSeconds ? 'Iniciar descanso de ' + formatTimerSeconds(durationSeconds) : 'Sin descanso configurado'
        };
      }

      const remainingSeconds = (timer.endAt - Date.now()) / 1000;
      if (remainingSeconds <= 0) {
        return { className: ' is-complete', label: '0', progress: 0, ariaLabel: 'Descanso completo. Tocar para reiniciar' };
      }

      const progress = timer.durationSeconds ? Math.max(0, Math.min(100, (remainingSeconds / timer.durationSeconds) * 100)) : 0;
      return {
        className: ' is-running',
        label: String(Math.ceil(remainingSeconds)),
        progress,
        ariaLabel: 'Descanso en curso: ' + formatTimerSeconds(remainingSeconds)
      };
    }

    function updateRestTimerButtons() {
      const buttons = document.querySelectorAll('.set-rest-timer');
      buttons.forEach(function(button) {
        const info = getRestTimerInfo(button.dataset.setId, button.dataset.rest);
        const label = button.querySelector('span');
        if (label) label.textContent = info.label;
        button.setAttribute('aria-label', info.ariaLabel);
        button.setAttribute('title', info.ariaLabel);
        button.style.setProperty('--timer-progress', info.progress + '%');
        button.classList.toggle('is-running', info.className.indexOf('is-running') !== -1);
        button.classList.toggle('is-complete', info.className.indexOf('is-complete') !== -1);
      });
    }

    function ensureRestTimerTicker() {
      if (restTimerInterval) return;
      restTimerInterval = window.setInterval(function() {
        checkRestTimerCompletion();
        updateRestTimerButtons();
      }, 1000);
    }

    function startRestTimer(setId, rest) {
      const durationSeconds = parseRestSeconds(rest);
      prepareRestAlert();
      if (!durationSeconds) return alert('Esta línea no tiene descanso configurado.');

      if (activeRestTimer && activeRestTimer.setId === setId && activeRestTimer.endAt > Date.now()) {
        activeRestTimer = null;
        updateRestTimerButtons();
        return;
      }

      activeRestTimer = { setId, endAt: Date.now() + (durationSeconds * 1000), durationSeconds, notified: false };
      updateRestTimerButtons();
      ensureRestTimerTicker();
    }

    function groupRowsByExercise(rows) {
      const groups = [];
      rows.forEach(function(row) {
        let group = groups.find(function(item) { return item.exercise.id === row.exercise.id; });
        if (!group) {
          group = { workout: row.workout, exercise: row.exercise, rows: [], volume: 0, estimated: 0 };
          groups.push(group);
        }
        group.rows.push(row);
        group.volume += Number(row.set.weight || 0) * Number(row.set.reps || 0);
        group.estimated = Math.max(group.estimated, estimated1RM(row.set));
      });
      return groups;
    }

      if (Number.isNaN(weight) || Number.isNaN(reps)) return alert('Peso y repeticiones tienen que ser números válidos.');

      const workout = getOrCreateWorkoutForDate(date);

      let exercise = workout.exercises.find(function(ex) {

    function updateSet(workoutId, exerciseId, setId, sourcePrefix) {
      const ref = findSetRef(workoutId, exerciseId, setId);
      if (!ref) return alert('No encontré la línea para editar.');

      const prefix = sourcePrefix || 'edit';
      const date = currentTableDate || getValue('table-date') || getValue(prefix + '-date-' + setId) || getValue('edit-date') || todayISO();
      const workoutTitle = getStoredDayForDate(date) || ref.workout.title || 'Día';
      const exerciseName = getTrimmedValue(prefix + '-exercise-' + setId) || getTrimmedValue('edit-exercise');
      const weightRaw = String(getValue(prefix + '-weight-' + setId) || getValue('edit-weight') || '').replace(',', '.');
      const repsRaw = String(getValue(prefix + '-reps-' + setId) || getValue('edit-reps') || '').replace(',', '.');
      const rir = getValue(prefix + '-rir-' + setId) || getValue('edit-rir') || '';
      const rest = getTrimmedValue(prefix + '-rest-' + setId) || getTrimmedValue('edit-rest');
      const notes = getTrimmedValue(prefix + '-notes-' + setId) || getTrimmedValue('edit-notes');

      if (!exerciseName) return alert('Ingresá el ejercicio.');
      if (!weightRaw || !repsRaw) return alert('Ingresá peso y repeticiones.');

      const weight = Number(weightRaw);
      const reps = Number(repsRaw);
      if (Number.isNaN(weight) || Number.isNaN(reps)) return alert('Peso y repeticiones tienen que ser números válidos.');

      const updatedSet = {
        id: ref.set.id,
        weight,
        reps,
        rir,
        rest,
        notes,
        done: !!ref.set.done
      };

      const sameDate = ref.workout.date === date;
      const sameExercise = String(ref.exercise.name).toLowerCase() === exerciseName.toLowerCase();

      if (sameDate && sameExercise) {
        ref.set.weight = weight;
        ref.set.reps = reps;
        ref.set.rir = rir;
        ref.set.rest = rest;
        ref.set.notes = notes;
      } else {
        ref.exercise.sets = ref.exercise.sets.filter(function(s) { return s.id !== setId; });

        const targetWorkout = getOrCreateWorkoutForDate(date);

        let targetExercise = targetWorkout.exercises.find(function(ex) {
          return String(ex.name).toLowerCase() === exerciseName.toLowerCase();
        });

        if (!targetExercise) {
          targetExercise = { id: uid(), name: exerciseName, notes: '', sets: [] };
          targetWorkout.exercises.push(targetExercise);
        }

        targetExercise.sets.push(updatedSet);

        ref.workout.exercises = ref.workout.exercises.filter(function(ex) {
          return ex.sets.length > 0;
        });

        state.workouts = state.workouts.filter(function(w) {
          return w.exercises.length > 0;
        });
      }

      lastQuickRowDefaults = { date, workoutTitle, exerciseName, weight, rest };
      lastQuickRowStatus = '<div class="card" style="box-shadow:none; border-color:rgba(126,231,135,.35); color:var(--ok); margin-bottom:10px">Línea editada: ' + escapeHtml(exerciseName) + ' · ' + escapeHtml(weight) + ' kg x ' + escapeHtml(reps) + '</div>';
      editingRowId = null;
      if (draftRowId === setId) draftRowId = null;
      saveState(setId);
    }

    function removeDraftRow(setId) {
      state.workouts.forEach(function(workout) {
        workout.exercises.forEach(function(exercise) {
          exercise.sets = exercise.sets.filter(function(s) { return s.id !== setId; });
        });
        workout.exercises = workout.exercises.filter(function(exercise) {
          return exercise.sets.length > 0;
        });

      state.workouts = state.workouts.filter(function(workout) {
        return workout.exercises.length > 0;

    }

    function buildWorkoutText(workoutId) {
      const workout = state.workouts.find(function(w) { return w.id === workoutId; });
      if (!workout) return 'Día no encontrado.';

      const lines = [];
      lines.push(formatDate(workout.date) + ' - ' + workout.title);
      lines.push('');

      workout.exercises.forEach(function(exercise) {
        lines.push(exercise.name);
        if (exercise.notes) lines.push('Notas ejercicio: ' + exercise.notes);

        exercise.sets.forEach(function(set, index) {
          const parts = [];
          parts.push((index + 1) + ') ' + Number(set.weight || 0) + ' kg x ' + Number(set.reps || 0));
          if (set.rest) parts.push('descanso ' + set.rest);
          if (set.rir !== '' && set.rir != null) parts.push('RIR ' + set.rir);
          if (set.notes) parts.push('nota: ' + set.notes);
          lines.push(parts.join(' | '));
        });

        lines.push('');
      });

      if (workout.notes) {
        lines.push('Notas del día:');
        lines.push(workout.notes);
      }

      return lines.join('\n').trim();
    }

    function downloadBackup() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      downloadBlob(blob, 'gym-log-backup-' + todayISO() + '.json');
    }

    function downloadCSV() {
      const rows = [['fecha','dia','ejercicio','peso','reps','rir','descanso','notas_serie','notas_ejercicio','notas_dia']];
      state.workouts.forEach(function(w) {
        w.exercises.forEach(function(ex) {
          ex.sets.forEach(function(s) {
            rows.push([w.date, w.title, ex.name, s.weight, s.reps, s.rir, s.rest, s.notes, ex.notes, w.notes]);
          });
        });
      });
      const csv = rows.map(function(row) { return row.map(csvEscape).join(','); }).join('\n');
      downloadBlob(new Blob([csv], { type: 'text/csv;charset=utf-8' }), 'gym-log-' + todayISO() + '.csv');
    }

    function csvEscape(value) {
      const str = String(value == null ? '' : value);
      return '"' + str.replace(/"/g, '""') + '"';
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function importBackup() {
      const importInput = document.getElementById('import-file');
      const file = importInput && importInput.files ? importInput.files[0] : null;
      if (!file) return alert('Seleccioná un archivo JSON.');
      const reader = new FileReader();
      reader.onload = function() {
        try {
          const data = JSON.parse(reader.result);
          if (!data.workouts || !Array.isArray(data.workouts)) throw new Error('Formato inválido');
          state = normalizeState(data);
          saveState();
          alert('Backup importado correctamente.');
        } catch (error) {
          alert('No se pudo importar. El archivo no parece válido.');
        }
      };
      reader.readAsText(file);
    }

    function runTests() {
      console.assert(formatDate('2026-05-27') === '27/05/26', 'formatDate debe usar año de 2 dígitos');
      console.assert(escapeHtml('<x>&"\'') === '&lt;x&gt;&amp;&quot;&#039;', 'escapeHtml debe escapar HTML');
      const sample = { weight: 100, reps: 5 };
      console.assert(Math.abs(estimated1RM(sample) - 116.6666667) < 0.001, 'estimated1RM debe calcular Epley básico');
      console.assert(parseRestSeconds('3 min') === 180, 'parseRestSeconds debe interpretar minutos');
      console.assert(parseRestSeconds('90 seg') === 90, 'parseRestSeconds debe interpretar segundos');
      console.assert(parseRestSeconds('1:30') === 90, 'parseRestSeconds debe interpretar mm:ss');
      console.assert(formatTimerSeconds(180) === '3:00', 'formatTimerSeconds debe usar m:ss');
      const previousState = state;
      state = { dayByDate: {}, workouts: [{ id: 'w1', date: '2026-05-27', title: 'Día 1', notes: '', exercises: [{ id: 'e1', name: 'Press <plano>', notes: '', sets: [{ id: 's1', weight: 100, reps: 5, rir: 1, rest: '3 min', notes: 'ok' }] }] }] };
      const text = buildWorkoutText('w1');
      console.assert(text.indexOf('Press <plano>') !== -1, 'buildWorkoutText debe preservar texto plano');
      console.assert(text.indexOf('100 kg x 5') !== -1, 'buildWorkoutText debe incluir peso y reps');

      console.assert(defaults.weight === 100, '+ debe traer el peso de la línea anterior');

      if (target.id === 'btn-generate-next-week') generateNextWeek();
      if (target.dataset.dayPicker) openDayMenu(target);
      if (target.classList.contains('btn-select-day')) selectLoadedDay(target.dataset.date);
      if (!target.dataset.dayPicker && !target.classList.contains('btn-select-day')) closeDayMenu();

      if (target.classList.contains('btn-edit-set')) {
        showEditSeriesPanel(target.dataset.workoutId, target.dataset.exerciseId, target.dataset.setId);
      }

      if (target.classList.contains('btn-save-inline-set')) {
        updateSet(target.dataset.workoutId, target.dataset.exerciseId, target.dataset.setId, 'inline');
      }

      if (target.classList.contains('btn-save-edit-set')) {
        updateSet(target.dataset.workoutId, target.dataset.exerciseId, target.dataset.setId, 'edit');
      }

      if (target.classList.contains('btn-cancel-inline-set')) {
        if (draftRowId && editingRowId === draftRowId) {
          removeDraftRow(draftRowId);
          draftRowId = null;
        }
        editingRowId = null;
        renderTable();
      }

      if (target.classList.contains('btn-delete-set')) {
        deleteSet(target.dataset.workoutId, target.dataset.exerciseId, target.dataset.setId);
      }

      if (target.classList.contains('set-rest-timer')) {
        startRestTimer(target.dataset.setId, target.dataset.rest);
      }

      if (target.id === 'btn-show-workout-text') showWorkoutText(target.dataset.workoutId);
      if (target.id === 'btn-copy-workout-text') copyWorkoutText(target.dataset.workoutId);
    });

    document.addEventListener('change', function(event) {
      if (event.target && event.target.id === 'history-workout') renderWorkoutHistory();
      if (event.target && event.target.id === 'table-date') {
        currentTableDate = event.target.value || todayISO();
        currentTableDay = null;
        editingRowId = null;
        draftRowId = null;
        rememberTableDate(currentTableDate, true);
        renderTable();
      }
      if (event.target && (event.target.id === 'table-day' || event.target.id === 'table-day-floating')) {
        handleDayInput(event.target.value);
      }
    });

    window.addEventListener('DOMContentLoaded', function() {
      try {
        runTests();
        seedDay1Workout();
        seedDay2Workout();
        seedDay3Workout();
        seedDay4Workout();
        restoreLastTableSelection();
        setView('table');
        window.addEventListener('scroll', updateFloatingDayControl, { passive: true });
        window.addEventListener('resize', updateFloatingDayControl);
        updateFloatingDayControl();
      } catch (error) {
        console.error(error);
        showStartupError(error);
      }
    });
  </script>
</body>
</html>
